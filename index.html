<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houston Flood Visualization</title>
    
    <!-- Leaflet CSS and JavaScript -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Leaflet-ESRI Plugin for ArcGIS Feature Layers -->
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    
    <!-- Local CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="map-container">
        <div id="sidebar">
            <div id="sidebar-header">
                <h1>Houston's Tax Day Floods Revisited</h1>
                <button id="sidebar-toggle" class="sidebar-toggle-btn">‹</button>
            </div>
            <div id="info-panel">
                <p>Visualizing flood data for Clear Creek, Houston, Texas</p>
            </div>
            <div id="search-panel">
                <input type="text" id="address-search" placeholder="Search address..." />
                <button id="search-btn">Search</button>
            </div>
            <div id="controls-panel">
                <button id="controls-toggle" class="toggle-btn">⚙ Settings ▼</button>
                <div id="controls-content">
                    <div id="basemap-selector">
                        <label for="basemap-dropdown">Basemap:</label>
                        <select id="basemap-dropdown">
                            <option value="cartodb-positron">CartoDB Positron</option>
                            <option value="osm">OpenStreetMap</option>
                            <option value="cartodb-voyager">CartoDB Voyager</option>
                            <option value="esri-aerial">Satellite</option>
                            <option value="usgs-topo">USGS Topographic</option>
                        </select>
                    </div>
                    <div id="raster-toggle">
                        <label for="raster-selector">Flood Rasters:</label>
                        <select id="raster-selector">
                            
                            <option value="historic">Historic Flood Data</option>
                            <option value="transposed">Transposed Flood Data</option>
                            <option value="none">None</option>
                        </select>
                    </div>
                    <div id="opacity-control">
                        <label for="opacity-slider">Transparency:</label>
                        <div id="opacity-container">
                            <input type="range" id="opacity-slider" min="0" max="100" value="30" />
                            <span id="opacity-value">70%</span>
                        </div>
                    </div>
                    <div id="feature-layer-toggle">
                        <label>
                            <input type="checkbox" id="centroids-toggle" />
                            Show Centroids (Feature Layer)
                        </label>
                    </div>
                    <div id="centroid-field-selector">
                        <label for="centroid-field-dropdown">Single Family Homes:</label>
                        <select id="centroid-field-dropdown">
                            <option value="TD_histori">Historic Flood Data</option>
                            <option value="TD_transpo">Transposed Flood Data</option>
                        </select>
                    </div>
                    <div id="depth-statistics">
                        <h4>Single Family Home Count by Depth</h4>
                        <div id="stats-content">
                            <p style="color: #888; font-size: 12px;">Load centroids to view statistics</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="viewDiv"></div>
        <div id="flood-legend">
            <h3>Flood Intensity</h3>
            <div class="legend-item" data-color="0">
                <span class="legend-color" style="background-color: #ffffff;"></span>
                <div class="legend-text">
                    <span class="legend-label">No Flood</span>
                    <span class="legend-depth">0 ft</span>
                </div>
            </div>
            <div class="legend-item" data-color="1">
                <span class="legend-color" style="background-color: #ccffff;"></span>
                <div class="legend-text">
                    <span class="legend-label">Light</span>
                    <span class="legend-depth">0-2 ft</span>
                </div>
            </div>
            <div class="legend-item" data-color="2">
                <span class="legend-color" style="background-color: #66d9ff;"></span>
                <div class="legend-text">
                    <span class="legend-label">Moderate</span>
                    <span class="legend-depth">2-4 ft</span>
                </div>
            </div>
            <div class="legend-item" data-color="3">
                <span class="legend-color" style="background-color: #0099ff;"></span>
                <div class="legend-text">
                    <span class="legend-label">Heavy</span>
                    <span class="legend-depth">4-6 ft</span>
                </div>
            </div>
            <div class="legend-item" data-color="4">
                <span class="legend-color" style="background-color: #0047b2;"></span>
                <div class="legend-text">
                    <span class="legend-label">Severe</span>
                    <span class="legend-depth">6-8 ft</span>
                </div>
            </div>
            <div class="legend-item" data-color="5">
                <span class="legend-color" style="background-color: #F523F5;"></span>
                <div class="legend-text">
                    <span class="legend-label">Extreme</span>
                    <span class="legend-depth">8-10+ ft</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Local JavaScript -->
    <script src="app.js"></script>
</body>
</html>
